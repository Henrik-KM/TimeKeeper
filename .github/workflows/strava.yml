name: Update Strava feed

on:
  push:
    paths:
      - ".github/workflows/strava.yml"
      - "scripts/fetch_strava.py"
      - "assets/strava_overrides.json"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava activities
        id: fetch
        continue-on-error: true
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: python scripts/fetch_strava.py

      - name: Commit updated JSON
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/strava.json _private/strava_token.json
          git commit -m "Update Strava feed" || exit 0
          git push

      - name: Report Strava fetch failure
        if: steps.fetch.outcome == 'failure'
        run: exit 1
